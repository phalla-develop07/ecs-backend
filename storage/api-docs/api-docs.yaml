openapi: 3.0.0
info:
  title: 'My API Documentation'
  description: 'API documentation for my Laravel application'
  contact:
    email: admin@example.com
  license:
    name: MIT
    url: 'https://opensource.org/licenses/MIT'
  version: 1.0.0
servers:
  -
    url: 'http://localhost:8000'
    description: 'API Server'
paths:
  /api/register:
    post:
      tags:
        - Auth
      summary: 'Register a new user account'
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required:
                - name
                - email
                - password
                - password_confirmation
              properties:
                name:
                  description: 'Required — letters, spaces, and hyphens only'
                  type: string
                  example: 'Phalla Sok'
                  maxLength: 255
                  minLength: 2
                email:
                  description: 'Required — must be unique, valid RFC format with DNS check'
                  type: string
                  format: email
                  example: phalla@example.com
                  maxLength: 255
                password:
                  description: 'Required — min 8 chars, must have uppercase, lowercase, number, symbol, and not be a known leaked password'
                  type: string
                  format: password
                  example: Secret@123
                  minLength: 8
                password_confirmation:
                  description: 'Required — must exactly match password'
                  type: string
                  format: password
                  example: Secret@123
              type: object
      responses:
        201:
          description: 'Account created successfully'
          content:
            application/json:
              schema:
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'Account created successfully. Welcome!'
                  token:
                    type: string
                    example: 1|abc123...
                  user:
                    properties:
                      id:
                        type: integer
                        example: 1
                      name:
                        type: string
                        example: 'Phalla Sok'
                      email:
                        type: string
                        example: phalla@example.com
                      created_at:
                        type: string
                        format: date-time
                        example: '2024-01-01T00:00:00.000000Z'
                    type: object
                type: object
        422:
          description: 'Validation failed'
          content:
            application/json:
              schema:
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: 'Registration failed due to validation errors.'
                  errors:
                    properties:
                      name:
                        type: array
                        items:
                          type: string
                          example: 'Full name is required.'
                      email:
                        type: array
                        items:
                          type: string
                          example: 'This email address is already registered.'
                      password:
                        type: array
                        items:
                          type: string
                          example: 'Password confirmation does not match.'
                      password_confirmation:
                        type: array
                        items:
                          type: string
                          example: 'Please confirm your password.'
                    type: object
                type: object
        500:
          description: 'Server error during registration'
          content:
            application/json:
              schema:
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: 'Registration failed. Please try again later.'
                type: object
  /api/login:
    post:
      tags:
        - Auth
      summary: 'Login and receive a Sanctum Bearer token'
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required:
                - email
                - password
              properties:
                email:
                  description: 'Required — valid email format, max 255 characters'
                  type: string
                  format: email
                  example: phalla@example.com
                  maxLength: 255
                password:
                  description: 'Required — min 8, max 128 characters (DoS protection)'
                  type: string
                  format: password
                  example: Secret@123
                  maxLength: 128
                  minLength: 8
              type: object
      responses:
        200:
          description: 'Login successful — returns Sanctum token'
          content:
            application/json:
              schema:
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'Login successful. Welcome back!'
                  token:
                    type: string
                    example: 2|xyz789...
                  user:
                    properties:
                      id:
                        type: integer
                        example: 1
                      name:
                        type: string
                        example: 'Phalla Sok'
                      email:
                        type: string
                        example: phalla@example.com
                      created_at:
                        type: string
                        format: date-time
                        example: '2024-01-01T00:00:00.000000Z'
                    type: object
                type: object
        401:
          description: 'Invalid credentials — vague message to prevent user enumeration'
          content:
            application/json:
              schema:
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: 'These credentials do not match our records.'
                type: object
        422:
          description: 'Validation failed'
          content:
            application/json:
              schema:
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: 'Login failed due to validation errors.'
                  errors:
                    properties:
                      email:
                        type: array
                        items:
                          type: string
                          example: 'Email address is required.'
                      password:
                        type: array
                        items:
                          type: string
                          example: 'Password must be at least 8 characters.'
                    type: object
                type: object
        429:
          description: 'Too many login attempts — rate limited (5 attempts per 60s per IP + email)'
          content:
            application/json:
              schema:
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: 'Too many login attempts. Please try again in 45 seconds.'
                  retry_after:
                    description: 'Seconds remaining before the rate limit resets'
                    type: integer
                    example: 45
                type: object
  /api/auth/profile:
    get:
      tags:
        - Auth
      summary: 'Get the currently authenticated user'
      operationId: authProfile
      responses:
        200:
          description: 'Profile retrieved successfully'
          content:
            application/json:
              schema:
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'Profile retrieved successfully.'
                  user:
                    properties:
                      id:
                        type: integer
                        example: 1
                      name:
                        type: string
                        example: 'Phalla Sok'
                      email:
                        type: string
                        example: phalla@example.com
                      created_at:
                        type: string
                        format: date-time
                        example: '2024-01-01T00:00:00.000000Z'
                      updated_at:
                        type: string
                        format: date-time
                        example: '2024-01-01T00:00:00.000000Z'
                    type: object
                type: object
        401:
          description: 'Unauthenticated — token missing, invalid, or expired'
          content:
            application/json:
              schema:
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: 'Unauthenticated. Please login to access your profile.'
                type: object
      security:
        -
          sanctum: []
  /api/logout:
    post:
      tags:
        - Auth
      summary: 'Logout — revoke current token or all tokens across all devices'
      operationId: logout
      requestBody:
        required: false
        content:
          application/json:
            schema:
              properties:
                logout_all:
                  description: 'Optional — set true to revoke ALL tokens across every device. Defaults to false (current token only).'
                  type: boolean
                  example: false
                  nullable: true
              type: object
      responses:
        200:
          description: 'Logged out successfully'
          content:
            application/json:
              schema:
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    description: 'Message varies: "logged out successfully" (single) or "logged out from all devices" (logout_all=true)'
                    type: string
                    example: 'You have been logged out successfully.'
                type: object
        401:
          description: 'Unauthenticated — no active session found'
          content:
            application/json:
              schema:
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: 'Unauthenticated. No active session found.'
                type: object
        422:
          description: 'Validation failed — logout_all must be a boolean'
          content:
            application/json:
              schema:
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: 'Invalid request parameters.'
                  errors:
                    properties:
                      logout_all:
                        type: array
                        items:
                          type: string
                          example: 'The logout_all field must be true or false.'
                    type: object
                type: object
        500:
          description: 'Server error during logout'
          content:
            application/json:
              schema:
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: 'Logout failed. Please try again.'
                type: object
      security:
        -
          sanctum: []
  /api/cart:
    get:
      tags:
        - Cart
      summary: 'Get all cart items for the authenticated user'
      operationId: getCart
      responses:
        200:
          description: 'Cart items retrieved successfully'
          content:
            application/json:
              schema:
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      properties:
                        id:
                          type: integer
                          example: 1
                        user_id:
                          type: integer
                          example: 1
                        product_id:
                          type: integer
                          example: 3
                        quantity:
                          type: integer
                          example: 2
                        product:
                          properties:
                            id:
                              type: integer
                              example: 3
                            name:
                              type: string
                              example: 'Rose Perfume'
                            price:
                              type: number
                              format: float
                              example: 29.99
                            image:
                              type: string
                              example: products/abc.jpg
                              nullable: true
                          type: object
                      type: object
                  total:
                    description: 'Sum of (product price × quantity) across all cart items'
                    type: number
                    format: float
                    example: 59.98
                type: object
        401:
          description: 'Unauthenticated — Bearer token missing or invalid'
          content:
            application/json:
              schema:
                properties:
                  message:
                    type: string
                    example: Unauthenticated.
                type: object
      security:
        -
          sanctum: []
    post:
      tags:
        - Cart
      summary: 'Add a product to cart — increments quantity if product already exists in cart'
      operationId: addToCart
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required:
                - product_id
              properties:
                product_id:
                  description: 'Required — must exist in products table'
                  type: integer
                  example: 3
                quantity:
                  description: 'Optional — must be integer min 1, defaults to 1 if omitted'
                  type: integer
                  example: 2
                  minimum: 1
              type: object
      responses:
        201:
          description: 'Product added to cart (or quantity incremented if already in cart)'
          content:
            application/json:
              schema:
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    properties:
                      id:
                        type: integer
                        example: 1
                      user_id:
                        type: integer
                        example: 1
                      product_id:
                        type: integer
                        example: 3
                      quantity:
                        type: integer
                        example: 2
                      product:
                        properties:
                          id:
                            type: integer
                            example: 3
                          name:
                            type: string
                            example: 'Rose Perfume'
                          price:
                            type: number
                            format: float
                            example: 29.99
                          image:
                            type: string
                            example: products/abc.jpg
                            nullable: true
                        type: object
                    type: object
                type: object
        401:
          description: 'Unauthenticated — Bearer token missing or invalid'
          content:
            application/json:
              schema:
                properties:
                  message:
                    type: string
                    example: Unauthenticated.
                type: object
        422:
          description: 'Validation failed'
          content:
            application/json:
              schema:
                properties:
                  message:
                    type: string
                    example: 'The product_id field is required.'
                  errors:
                    properties:
                      product_id:
                        type: array
                        items:
                          type: string
                          example: 'The selected product_id is invalid.'
                      quantity:
                        type: array
                        items:
                          type: string
                          example: 'The quantity must be at least 1.'
                    type: object
                type: object
      security:
        -
          sanctum: []
  '/api/cart/{id}':
    put:
      tags:
        - Cart
      summary: 'Update the quantity of a specific cart item'
      operationId: updateCart
      parameters:
        -
          name: id
          in: path
          description: 'Cart item ID — must belong to the authenticated user'
          required: true
          schema:
            type: integer
            example: 1
            minimum: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required:
                - quantity
              properties:
                quantity:
                  description: 'Required — integer min 1, replaces the current quantity'
                  type: integer
                  example: 5
                  minimum: 1
              type: object
      responses:
        200:
          description: 'Cart item quantity updated successfully'
          content:
            application/json:
              schema:
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    properties:
                      id:
                        type: integer
                        example: 1
                      user_id:
                        type: integer
                        example: 1
                      product_id:
                        type: integer
                        example: 3
                      quantity:
                        type: integer
                        example: 5
                      product:
                        properties:
                          id:
                            type: integer
                            example: 3
                          name:
                            type: string
                            example: 'Rose Perfume'
                          price:
                            type: number
                            format: float
                            example: 29.99
                          image:
                            type: string
                            example: products/abc.jpg
                            nullable: true
                        type: object
                    type: object
                type: object
        401:
          description: 'Unauthenticated — Bearer token missing or invalid'
          content:
            application/json:
              schema:
                properties:
                  message:
                    type: string
                    example: Unauthenticated.
                type: object
        404:
          description: 'Cart item not found or does not belong to the authenticated user'
          content:
            application/json:
              schema:
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: 'Not found'
                type: object
        422:
          description: 'Validation failed'
          content:
            application/json:
              schema:
                properties:
                  message:
                    type: string
                    example: 'The quantity field is required.'
                  errors:
                    properties:
                      quantity:
                        type: array
                        items:
                          type: string
                          example: 'The quantity must be at least 1.'
                    type: object
                type: object
      security:
        -
          sanctum: []
    delete:
      tags:
        - Cart
      summary: 'Remove a specific item from the cart'
      operationId: removeFromCart
      parameters:
        -
          name: id
          in: path
          description: 'Cart item ID — must belong to the authenticated user'
          required: true
          schema:
            type: integer
            example: 1
            minimum: 1
      responses:
        200:
          description: 'Cart item removed successfully'
          content:
            application/json:
              schema:
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'Item removed'
                type: object
        401:
          description: 'Unauthenticated — Bearer token missing or invalid'
          content:
            application/json:
              schema:
                properties:
                  message:
                    type: string
                    example: Unauthenticated.
                type: object
        404:
          description: 'Cart item not found or does not belong to the authenticated user'
          content:
            application/json:
              schema:
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: 'Not found'
                type: object
      security:
        -
          sanctum: []
  /api/categories:
    get:
      tags:
        - Categories
      summary: 'Get all categories'
      operationId: getCategories
      responses:
        200:
          description: 'Categories retrieved successfully'
          content:
            application/json:
              schema:
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'Categories are gotten successfully'
                  data:
                    type: array
                    items:
                      properties:
                        id:
                          type: integer
                          example: 1
                        name:
                          type: string
                          example: Perfumes
                        created_at:
                          type: string
                          format: date-time
                          example: '2024-01-01T00:00:00.000000Z'
                        updated_at:
                          type: string
                          format: date-time
                          example: '2024-01-01T00:00:00.000000Z'
                      type: object
                type: object
  /api/checkout:
    post:
      tags:
        - Orders
      summary: 'Checkout — converts all cart items into an order then clears the cart'
      operationId: checkout
      requestBody:
        required: false
        content:
          application/json:
            schema:
              properties:
                address:
                  description: 'Optional — shipping address, defaults to empty string if omitted'
                  type: string
                  example: '123 Main St, Phnom Penh'
                  nullable: true
              type: object
      responses:
        201:
          description: 'Order placed successfully — cart is cleared after this call'
          content:
            application/json:
              schema:
                properties:
                  success:
                    type: boolean
                    example: true
                  order:
                    properties:
                      id:
                        type: integer
                        example: 1
                      user_id:
                        type: integer
                        example: 1
                      total_amount:
                        type: number
                        format: float
                        example: 89.97
                      status:
                        description: 'Always "pending" on creation'
                        type: string
                        example: pending
                      address:
                        type: string
                        example: '123 Main St, Phnom Penh'
                      created_at:
                        type: string
                        format: date-time
                        example: '2024-01-01T00:00:00.000000Z'
                      items:
                        type: array
                        items:
                          properties:
                            id:
                              type: integer
                              example: 1
                            order_id:
                              type: integer
                              example: 1
                            product_id:
                              type: integer
                              example: 3
                            quantity:
                              type: integer
                              example: 2
                            price:
                              description: 'Price snapshot at the time of checkout'
                              type: number
                              format: float
                              example: 29.99
                            product:
                              properties:
                                id:
                                  type: integer
                                  example: 3
                                name:
                                  type: string
                                  example: 'Rose Perfume'
                                price:
                                  type: number
                                  format: float
                                  example: 29.99
                                image:
                                  type: string
                                  example: products/abc.jpg
                                  nullable: true
                              type: object
                          type: object
                    type: object
                type: object
        401:
          description: 'Unauthenticated — Bearer token missing or invalid'
          content:
            application/json:
              schema:
                properties:
                  message:
                    type: string
                    example: Unauthenticated.
                type: object
        422:
          description: 'Cart is empty — nothing to checkout'
          content:
            application/json:
              schema:
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: 'Cart is empty'
                type: object
        500:
          description: 'Checkout failed — transaction rolled back, cart is preserved'
          content:
            application/json:
              schema:
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: 'Checkout failed: SQLSTATE[...] ...'
                type: object
      security:
        -
          sanctum: []
  /api/orders:
    get:
      tags:
        - Orders
      summary: 'Get all orders for the authenticated user (paginated, 10 per page)'
      operationId: getOrders
      responses:
        200:
          description: 'Orders retrieved successfully'
          content:
            application/json:
              schema:
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'Products are gotten successfully'
                  data:
                    properties:
                      current_page:
                        type: integer
                        example: 1
                      per_page:
                        type: integer
                        example: 10
                      total:
                        type: integer
                        example: 25
                      data:
                        type: array
                        items:
                          properties:
                            id:
                              type: integer
                              example: 1
                            user_id:
                              type: integer
                              example: 1
                            total_amount:
                              type: number
                              format: float
                              example: 89.97
                            status:
                              type: string
                              example: pending
                            address:
                              type: string
                              example: '123 Main St, Phnom Penh'
                            created_at:
                              type: string
                              format: date-time
                              example: '2024-01-01T00:00:00.000000Z'
                            items:
                              type: array
                              items:
                                properties:
                                  id:
                                    type: integer
                                    example: 1
                                  product_id:
                                    type: integer
                                    example: 3
                                  quantity:
                                    type: integer
                                    example: 2
                                  price:
                                    type: number
                                    format: float
                                    example: 29.99
                                  product:
                                    properties:
                                      id: { type: integer, example: 3 }
                                      name: { type: string, example: 'Rose Perfume' }
                                      price: { type: number, format: float, example: 29.99 }
                                      image: { type: string, example: products/abc.jpg, nullable: true }
                                    type: object
                                type: object
                          type: object
                    type: object
                type: object
        401:
          description: 'Unauthenticated — Bearer token missing or invalid'
          content:
            application/json:
              schema:
                properties:
                  message:
                    type: string
                    example: Unauthenticated.
                type: object
      security:
        -
          sanctum: []
  '/api/orders/{id}':
    get:
      tags:
        - Orders
      summary: 'Get a single order with all its items and products'
      operationId: getOrder
      parameters:
        -
          name: id
          in: path
          description: 'Order ID — must belong to the authenticated user'
          required: true
          schema:
            type: integer
            example: 1
            minimum: 1
      responses:
        200:
          description: 'Order retrieved successfully'
          content:
            application/json:
              schema:
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'Order is gotten successfully'
                  data:
                    properties:
                      id:
                        type: integer
                        example: 1
                      user_id:
                        type: integer
                        example: 1
                      total_amount:
                        type: number
                        format: float
                        example: 89.97
                      status:
                        type: string
                        example: pending
                      address:
                        type: string
                        example: '123 Main St, Phnom Penh'
                      created_at:
                        type: string
                        format: date-time
                        example: '2024-01-01T00:00:00.000000Z'
                      updated_at:
                        type: string
                        format: date-time
                        example: '2024-01-01T00:00:00.000000Z'
                      items:
                        type: array
                        items:
                          properties:
                            id:
                              type: integer
                              example: 1
                            order_id:
                              type: integer
                              example: 1
                            product_id:
                              type: integer
                              example: 3
                            quantity:
                              type: integer
                              example: 2
                            price:
                              description: 'Price snapshot at the time of checkout — may differ from current product price'
                              type: number
                              format: float
                              example: 29.99
                            product:
                              properties:
                                id:
                                  type: integer
                                  example: 3
                                name:
                                  type: string
                                  example: 'Rose Perfume'
                                price:
                                  type: number
                                  format: float
                                  example: 29.99
                                image:
                                  type: string
                                  example: products/abc.jpg
                                  nullable: true
                              type: object
                          type: object
                    type: object
                type: object
        401:
          description: 'Unauthenticated — Bearer token missing or invalid'
          content:
            application/json:
              schema:
                properties:
                  message:
                    type: string
                    example: Unauthenticated.
                type: object
        404:
          description: 'Order not found or does not belong to the authenticated user'
          content:
            application/json:
              schema:
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: 'Not found'
                type: object
      security:
        -
          sanctum: []
  /api/products:
    get:
      tags:
        - Products
      summary: 'Get all products (paginated, 12 per page)'
      operationId: getProducts
      responses:
        200:
          description: 'Products retrieved successfully'
          content:
            application/json:
              schema:
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'Products are gotten successfully'
                  data:
                    properties:
